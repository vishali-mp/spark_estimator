</div>

<div id="settings-modal" class="fixed inset-0 z-[60] hidden">

        <div>

        </div>

    </div>
  </div>
</div>

<div id="app-modal" class="fixed inset-0 z-[60] hidden">

const STORAGE_KEY = 'sparkRepairProjects_v1';
const PRICES_KEY  = 'sparkRepairPrices_v1';

function loadPriceOverrides() {
  try { return JSON.parse(localStorage.getItem(PRICES_KEY) || '{}'); } catch { return {}; }
}
function savePriceOverrides() {
  try { localStorage.setItem(PRICES_KEY, JSON.stringify(state.priceOverrides)); } catch {}
}

function loadProjects() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch { return []; }
}

function saveProjects(list) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
  } catch {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(list.map(p => ({ ...p, photos: {} }))));
    } catch {}
  }
}

function saveCurrentState() {
  if (!state.currentProjectId) return;
  const list = loadProjects();
  const snap = {
    id: state.currentProjectId,
    name: state.currentProjectName,
    savedAt: new Date().toISOString(),
    items: state.items,
    photos: state.photos,
    rooms: state.rooms,
    customItems: state.customItems,
    projectPriceOverrides: state.projectPriceOverrides,
    notes: state.notes,
    deal: state.deal,
  };
  const idx = list.findIndex(p => p.id === state.currentProjectId);
  if (idx >= 0) list[idx] = snap; else list.unshift(snap);
  saveProjects(list);
}

let _saveTimer;
function scheduleSave() {

function findGroupForItem(itemId) {
  for (const [gid, g] of Object.entries(GROUPS)) {
    if (g.ids.includes(itemId)) return gid;
  }
  return null;

function blankItemState() {
  return { checked: false, qty: '', year: '' };
}

function getRoomData(cat) {
  return state.rooms[cat.id] || { instances: [], current: 0 };
}

function getMultiItems(cat) {
  const custom = state.customItems[cat.id] || [];
  return [...cat.items, ...custom];
}

function initRooms() {
  state.rooms = {};
  CATEGORIES.forEach(cat => {
    if (cat.type === 'multi') {
      const defaults = [];
      if (cat.id === 'bathroom') {
        defaults.push({ id: 'b1', name: 'Bathroom 1' }, { id: 'b2', name: 'Bathroom 2' });
      } else if (cat.id === 'living-common') {
        defaults.push({ id: 'lc1', name: 'Living Room' });
      }
      state.rooms[cat.id] = { instances: defaults, current: 0 };
    }
  });
}

function initState() {
  state.items = {};
  state.photos = {};
  state.customItems = {};
  state.projectPriceOverrides = {};
  state.expandedGroups = [];
  state.searchQuery = '';
  state.panelSearchQuery = '';
  initRooms();
  CATEGORIES.forEach(cat => {
    if (cat.type === 'multi') {
      const rd = getRoomData(cat);
      rd.instances.forEach(inst => {
        cat.items.forEach(item => { state.items[`${inst.id}:${item.id}`] = blankItemState(); });
      });
    } else {
      cat.items.forEach(item => { state.items[item.id] = blankItemState(); });
    }
  });
}

function loadProjectIntoState(proj) {
  state.currentProjectId = proj.id;
  state.currentProjectName = proj.name;
  state.items = proj.items || {};
  state.photos = proj.photos || {};
  state.rooms = proj.rooms || {};
  state.customItems = proj.customItems || {};
  state.projectPriceOverrides = proj.projectPriceOverrides || {};
  state.deal = proj.deal || { arv: '', purchasePrice: '', closingCosts: '', holdingCosts: '' };
  state.notes = proj.notes || {};
  state.currentCat = 0;
  state.showSummary = false;
  state.searchQuery = '';
  state.panelSearchQuery = '';
  state.expandedGroups = [];
  // Ensure all multi categories have valid room config
  CATEGORIES.forEach(cat => {
    if (cat.type === 'multi' && !state.rooms[cat.id]) {
      state.rooms[cat.id] = { instances: [], current: 0 };
    }
  });
  // Fill in any missing item keys
  CATEGORIES.forEach(cat => {
    if (cat.type === 'multi') {
      const rd = getRoomData(cat);
      rd.instances.forEach(inst => {
        getMultiItems(cat).forEach(item => {
          const k = `${inst.id}:${item.id}`;
          if (!state.items[k]) state.items[k] = blankItemState();
        });
      });
    } else {
      getMultiItems(cat).forEach(item => {
        if (!state.items[item.id]) state.items[item.id] = blankItemState();
      });
    }
  });
}

// HELPERS

function fmtTotal(n) { return '$' + Math.round(n).toLocaleString('en-US'); }

function fmtDate(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }
  catch { return ''; }
}

function getItemCost(item) {
  const po = state.projectPriceOverrides[item.id];
  if (po !== undefined) return po;
  const ov = state.priceOverrides[item.id];
  return ov !== undefined ? ov : item.cost;
}

function parseCsvLine(line) {
  const result = []; let cur = ''; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { if (inQ && line[i+1] === '"') { cur += '"'; i++; } else inQ = !inQ; }
    else if (c === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
    else cur += c;
  }
  result.push(cur.trim()); return result;
}
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  const headers = parseCsvLine(lines[0]);
  return lines.slice(1).filter(l => l.trim()).map(line => {
    const vals = parseCsvLine(line);
    return Object.fromEntries(headers.map((h, i) => [h.trim(), vals[i] ?? '']));
  });
}

function findItemDef(id) {
  if (id.includes(':')) { const iid = id.split(':')[1]; return findItemDef(iid); }
  for (const cat of CATEGORIES) {
    const found = cat.items.find(i => i.id === id);
    if (found) return found;
    const custom = (state.customItems[cat.id] || []).find(i => i.id === id);
    if (custom) return custom;
  }
  return null;
}

function calcItem(item, s) {
  if (!s || !s.checked) return 0;
  const q = parseFloat(s.qty);
  if (!q || q <= 0) return 0;
  const raw = q * getItemCost(item);
  return item.min ? Math.max(raw, item.min) : raw;
}

function calcInstanceTotal(cat, instance) {
  return getMultiItems(cat).reduce((t, item) => t + calcItem(item, state.items[`${instance.id}:${item.id}`]), 0);
}

function calcCategoryTotal(cat) {
  if (cat.type === 'multi') {
    const rd = getRoomData(cat);
    return rd.instances.reduce((t, inst) => t + calcInstanceTotal(cat, inst), 0);
  }
  return getMultiItems(cat).reduce((t, item) => t + calcItem(item, state.items[item.id]), 0);
}

function calcRunningTotal() { return CATEGORIES.reduce((t, cat) => t + calcCategoryTotal(cat), 0); }

function calcProgressUnits() {
  const itemToGroup = {};
  for (const [gid, g] of Object.entries(GROUPS)) {
    for (const id of g.ids) itemToGroup[id] = gid;
  }
  let total = 0, checked = 0;
  for (const cat of CATEGORIES) {
    if (cat.type === 'multi') {
      const rd = getRoomData(cat);
      for (const inst of rd.instances) {
        const seen = new Set();
        for (const item of getMultiItems(cat)) {
          const gid = itemToGroup[item.id];
          if (gid) {
            const key = `${inst.id}:${gid}`;
            if (!seen.has(key)) {
              seen.add(key);
              total++;
              if (GROUPS[gid].ids.some(id => state.items[`${inst.id}:${id}`]?.checked)) checked++;
            }
          } else {
            total++;
            if (state.items[`${inst.id}:${item.id}`]?.checked) checked++;
          }
        }
      }
    } else {
      const seen = new Set();
      for (const item of getMultiItems(cat)) {
        const gid = itemToGroup[item.id];
        if (gid) {
          if (!seen.has(gid)) {
            seen.add(gid);
            total++;
            if (GROUPS[gid].ids.some(id => state.items[id]?.checked)) checked++;
          }
        } else {
          total++;
          if (state.items[item.id]?.checked) checked++;
        }
      }
    }
  }
  return { total, checked };
}

function checkedCount(cat) {
  if (cat.type === 'multi') {
    const rd = getRoomData(cat);
    return rd.instances.reduce((t, inst) =>
      t + getMultiItems(cat).filter(item => state.items[`${inst.id}:${item.id}`]?.checked).length, 0);
  }
  return getMultiItems(cat).filter(item => state.items[item.id]?.checked).length;
}

function genItemId(catId) {
  const prefix = catId === 'interior-general' ? 'ig' : catId.substring(0, 2);
  const existing = Object.keys(state.items).filter(k => k.startsWith(prefix + '-cus-'));
  const n = existing.length + 1;
  return `${prefix}-cus-${n}`;
}

let pendingModal = null;

function openModal(title, placeholder, defaultVal, onConfirm) {
  pendingModal = onConfirm;
  document.getElementById('modal-title').textContent = title;
  const inp = document.getElementById('modal-input');
  inp.placeholder = placeholder || '';
  inp.value = defaultVal || '';
  document.getElementById('app-modal').classList.remove('hidden');
  setTimeout(() => { inp.focus(); inp.select(); }, 50);
}

function confirmModal() {
  const val = document.getElementById('modal-input').value.trim();
  if (val && pendingModal) pendingModal(val);
  closeModal();
}

function closeModal() {
  document.getElementById('app-modal').classList.add('hidden');
  pendingModal = null;
}

function refreshPanelList() {
  const q = state.panelSearchQuery.toLowerCase().trim();
  const list = loadProjects().filter(p => !q || p.name.toLowerCase().includes(q) || fmtDate(p.savedAt).toLowerCase().includes(q));
  { const inp = document.getElementById('panel-search-input'); if (inp) inp.value = state.panelSearchQuery; }
  { const clear = document.getElementById('panel-search-clear'); if (clear) clear.classList.toggle('hidden', !state.panelSearchQuery); }
  const panelList = document.getElementById('panel-list');
  panelList.innerHTML = list.length === 0
    ? '<p class="text-center text-gray-400 text-sm py-10">No saved projects</p>'
    : list.map(p => {
        const isActive = p.id === state.currentProjectId;
        const safeName = p.name.replace(/"/g, '&quot;');
        return `<div class="border-b border-gray-50 flex items-stretch ${isActive ? 'bg-orange-50' : ''}">

            ${!isActive ? `<button class="panel-delete-btn p-2.5 rounded-lg text-red-300" data-proj-id="${p.id}" data-proj-name="${safeName}" title="Delete">${TRASH}</button>` : ''}
          </div>
        </div>`;
      }).join('');

  panelList.querySelectorAll('.panel-proj-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.projId;
      if (id === state.currentProjectId) { closePanel(); return; }
      saveCurrentState();
      const proj = loadProjects().find(p => p.id === id);
      if (proj) { loadProjectIntoState(proj); render(); closePanel(); }
    });
  });

  panelList.querySelectorAll('.panel-rename-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.projId;
      openModal('Rename Project', 'e.g. 123 Main St', btn.dataset.projName, name => {
        const saved = loadProjects();
        const proj = saved.find(p => p.id === id);
        if (proj) {
          proj.name = name;
          saveProjects(saved);
          if (id === state.currentProjectId) { state.currentProjectName = name; render(); }
        }
        refreshPanelList();
      });
    });
  });

  panelList.querySelectorAll('.panel-delete-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.projId;
      if (!confirm(`Delete "${btn.dataset.projName}"? This cannot be undone.`)) return;
      saveProjects(loadProjects().filter(p => p.id !== id));
      refreshPanelList();
    });
  });
}

function renderLineItem(item, stateId, grouped) {
  const id = stateId || item.id;
  const s = state.items[id] || { checked: false, qty: '', year: '' };
  const isCustom = item.id.includes('-cus-');
  const outerCls = grouped
    ? `bg-slate-50 rounded-xl overflow-hidden border border-gray-100 ${s.checked ? 'ring-1 ring-orange-200' : ''}`
    : `bg-white rounded-2xl mb-2.5 shadow-sm overflow-hidden ${s.checked ? 'ring-1 ring-orange-200' : ''}`;
  if (item.noAction) return `
    <div data-item-card class="${outerCls}">
      <div class="px-4 py-3">

          <button data-action="toggle-item" data-id="${id}"
            class="flex-shrink-0 w-10 h-10 rounded-full border-2 flex items-center justify-center transition-all ${s.checked ? 'bg-orange-500 border-orange-500' : 'border-gray-300 bg-white'}">
            ${s.checked ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>` : ''}
          </button>

        </div>
      </div>

  const costLabel = `$${cost.toLocaleString('en-US', { minimumFractionDigits: 2 })} / ${item.unit}`;
  const meta = [item.notes, item.min ? `min $${item.min.toLocaleString()}` : null].filter(Boolean).join(' · ');
  return `
    <div data-item-card class="${outerCls}">
      <div class="p-4">
        <div class="flex gap-3 items-start">
          <button data-action="toggle-item" data-id="${id}"
            class="flex-shrink-0 mt-0.5 w-10 h-10 rounded-full border-2 flex items-center justify-center transition-all ${s.checked ? 'bg-orange-500 border-orange-500' : 'border-gray-300 bg-white'}">
            ${s.checked ? `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>` : ''}
          </button>
          <div class="flex-1 min-w-0">
            <div class="flex justify-between gap-2 items-start">
              <p class="font-semibold text-sm leading-snug ${s.checked ? 'text-gray-900' : 'text-gray-400'}">${item.name}</p>
              <p class="font-bold text-base flex-shrink-0 ${total > 0 ? 'text-orange-600' : 'text-gray-200'}">${total > 0 ? fmtTotal(total) : '—'}</p>
            </div>
            <div class="flex items-center gap-2 mt-0.5 flex-wrap">
              ${isCustom
                ? `<label class="text-xs text-gray-400">Cost</label>
                   <input data-action="update-custom-cost" data-id="${id}" type="number" value="${cost}"
                     min="0" step="0.01" inputmode="decimal"

                   <span class="text-xs text-gray-400">/ ${item.unit}</span>`
                : `<button data-action="edit-cost" data-id="${id}" class="text-xs text-orange-500 hover:text-orange-700 font-medium underline decoration-dotted">${costLabel}</button>`}
              ${meta ? `<span class="text-xs text-gray-400">· ${meta}</span>` : ''}
              ${isCustom ? `<button data-action="delete-item" data-id="${id}" class="text-xs text-red-400 ml-auto font-medium">Remove</button>` : ''}
            </div>
            ${s.checked ? `
              <div class="mt-3 flex flex-wrap gap-3 items-center">
                <div class="flex items-center gap-1">
                  <span class="text-sm text-gray-500 mr-1">Qty</span>
                  <button data-action="dec-qty" data-id="${id}" class="w-11 h-11 rounded-xl bg-gray-100 text-gray-600 font-bold text-lg flex items-center justify-center active:bg-gray-200 select-none">−</button>
                  <input data-action="update-qty" data-id="${id}" type="number" value="${s.qty}"
                    min="0" step="any" inputmode="decimal" placeholder="0"
                    class="border border-gray-200 rounded-xl px-2 py-2 w-24 text-right text-lg font-mono focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-transparent" />
                  <button data-action="inc-qty" data-id="${id}" class="w-11 h-11 rounded-xl bg-gray-100 text-gray-600 font-bold text-lg flex items-center justify-center active:bg-gray-200 select-none">+</button>
                  <span class="text-sm text-gray-400 ml-1">${item.unit}</span>
                </div>
                ${item.hasYear ? `
                  <div class="flex items-center gap-2">
                    <span class="text-sm text-gray-500">Year</span>
                    <input data-action="update-year" data-id="${id}" type="number" value="${s.year || ''}"
                      min="1970" max="${new Date().getFullYear()}" inputmode="numeric" placeholder="e.g. 2015"
                      class="border border-gray-200 rounded-xl px-3 py-2 w-28 text-center text-base font-mono focus:outline-none focus:ring-2 focus:ring-orange-400 focus:border-transparent" />
                  </div>` : ''}
              </div>
              ${item.hasYear ? `
                <div class="mt-3 pt-3 border-t border-gray-100">
                  <p class="text-xs font-medium text-gray-500 mb-2">Photos</p>
                  <div class="flex flex-wrap gap-2">
                    ${(state.photos[id] || []).map((ph, pi) => `
                      <div class="flex-shrink-0">
                        <div class="relative">
                          <img src="${ph.dataUrl}" class="w-24 h-24 rounded-xl object-cover border border-gray-100" />
                          <button data-action="remove-photo" data-id="${id}" data-index="${pi}"
                            class="absolute -top-2.5 -right-2.5 bg-red-500 text-white rounded-full w-9 h-9 text-base font-bold leading-none flex items-center justify-center shadow-md">×</button>
                        </div>
                        <input data-action="update-serial" data-id="${id}" data-index="${pi}" type="text" value="${(ph.serial || '').replace(/"/g,'&quot;')}"
                          placeholder="Serial #" inputmode="text"
                          class="mt-1 w-24 border border-gray-200 rounded-lg px-2 py-1 text-xs font-mono text-center focus:outline-none focus:ring-2 focus:ring-orange-400" />
                        ${renderDetections(ph)}
                      </div>`).join('')}
                    <button data-action="add-photo" data-id="${id}"
                      class="w-24 h-24 flex-shrink-0 rounded-xl border-2 border-dashed border-orange-300 bg-orange-50 flex flex-col items-center justify-center text-orange-400 gap-1 text-xs font-medium">
                      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 0 2-2l2-3h8l2 3h4a2 2 0 0 1 2 2z"/>
                        <circle cx="12" cy="13" r="4"/>
                      </svg>
                      Add Photo
                    </button>
                  </div>
                </div>` : ''}` : ''}
          </div>
        </div>
      </div>
    </div>`;
}

function buildSlots(items, instanceId) {
  const itemToGroup = {};
  for (const [gid, g] of Object.entries(GROUPS)) {
    for (const id of g.ids) itemToGroup[id] = gid;
  }
  const slots = [];
  const seenGroups = new Set();
  for (const item of items) {
    const gid = itemToGroup[item.id];
    if (gid) {
      if (!seenGroups.has(gid)) {
        seenGroups.add(gid);
        const groupItems = GROUPS[gid].ids.map(id => items.find(i => i.id === id)).filter(Boolean);
        const entries = groupItems.map(it => ({ item: it, stateId: instanceId ? `${instanceId}:${it.id}` : it.id }));
        slots.push({ type: 'group', gid, label: GROUPS[gid].label, entries });
      }
    } else {
      slots.push({ type: 'standalone', item, stateId: instanceId ? `${instanceId}:${item.id}` : item.id });
    }
  }
  return slots;
}

function renderGroup(slot) {
  const { gid, label, entries } = slot;
  const isExpanded = state.expandedGroups.includes(gid);
  const checkedInGroup = entries.filter(e => state.items[e.stateId]?.checked).length;
  const groupTotal = entries.reduce((sum, e) => sum + calcItem(e.item, state.items[e.stateId]), 0);
  const chevron = isExpanded
    ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="18 15 12 9 6 15"/></svg>`
    : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>`;
  return `
    <div data-group-card data-gid="${gid}" class="bg-white rounded-2xl mb-2.5 shadow-sm overflow-hidden ${checkedInGroup > 0 ? 'ring-1 ring-orange-200' : ''}">
      <button data-action="toggle-group" data-gid="${gid}"
        class="w-full flex items-center justify-between px-4 py-3.5 text-left">
        <div class="flex items-center gap-2.5 min-w-0">
          <span class="text-gray-400 flex-shrink-0">${chevron}</span>
          <span class="font-semibold text-sm text-gray-800">${label}</span>
          ${checkedInGroup > 0 ? `<span class="text-xs px-2 py-0.5 bg-orange-100 text-orange-600 rounded-full font-medium flex-shrink-0">${checkedInGroup} ✓</span>` : ''}
        </div>
        <span data-group-total class="font-bold text-base flex-shrink-0 ml-2 ${groupTotal > 0 ? 'text-orange-600' : 'text-gray-200'}">${groupTotal > 0 ? fmtTotal(groupTotal) : '—'}</span>
      </button>
      ${isExpanded ? `<div class="border-t border-gray-100 px-3 pb-3 pt-2 space-y-2">
        ${entries.map(e => renderLineItem(e.item, e.stateId, true)).join('')}
      </div>` : ''}
    </div>`;
}

function renderInstanceSubTabs(cat) {
  const rd = getRoomData(cat);
  return `<div class="bg-white border-b border-gray-200 scroll-x flex items-stretch flex-shrink-0">
    ${rd.instances.map((inst, i) => {
      const active = i === rd.current;
      const it = calcInstanceTotal(cat, inst);
      const ic = getMultiItems(cat).filter(item => state.items[`${inst.id}:${item.id}`]?.checked).length;
      return `<div class="flex-none flex items-center border-b-2 ${active ? 'border-orange-500 bg-orange-50' : 'border-transparent'}">
        <button data-action="switch-instance" data-cat="${cat.id}" data-index="${i}"
          class="pl-3 py-2.5 text-sm font-medium whitespace-nowrap ${active ? 'text-orange-700' : 'text-gray-500'}">
          ${inst.name}${ic > 0 ? `<span class="ml-1 text-xs ${active ? 'text-orange-500' : 'text-gray-400'}">${it > 0 ? fmtTotal(it) : ic + ' ✓'}</span>` : ''}
        </button>
        <button data-action="edit-instance-name" data-cat="${cat.id}" data-index="${i}" class="px-3 py-3 ${active ? 'text-orange-400' : 'text-gray-300'}">${PENCIL}</button>
        ${rd.instances.length > 1 ? `<button data-action="remove-instance" data-cat="${cat.id}" data-index="${i}" class="px-3 py-3 ${active ? 'text-red-300' : 'text-gray-200'}">${TRASH}</button>` : ''}
      </div>`;
    }).join('')}
    <button data-action="add-instance" data-cat="${cat.id}" class="flex-none px-4 py-3 text-sm font-semibold text-orange-500 border-b-2 border-transparent whitespace-nowrap">+ Add</button>
  </div>`;
}

function renderCategoryView() {
  const cat = CATEGORIES[state.currentCat];
  const items = getMultiItems(cat);
  if (cat.type === 'multi') {
    const rd = getRoomData(cat);
    const inst = rd.instances[rd.current];
    if (!inst) return `<div class="p-8 text-center text-gray-400"><p class="text-lg font-medium">No instances</p><p class="text-sm mt-1">Add a ${cat.name.toLowerCase()} to get started</p><button data-action="add-instance" data-cat="${cat.id}" class="mt-4 px-6 py-3 rounded-xl bg-orange-500 text-white font-semibold text-sm">+ Add ${cat.name}</button></div>`;
    const ic = items.filter(item => state.items[`${inst.id}:${item.id}`]?.checked).length;
    const slots = buildSlots(items, inst.id);
    return `<div>
      ${renderInstanceSubTabs(cat)}
      <div class="px-4 pt-4">
        <div class="flex justify-between items-center mb-3">
          <p class="text-xs font-bold uppercase tracking-widest text-gray-400">${inst.name}</p>
          <p class="text-xs text-gray-400">${ic} / ${items.length} selected</p>
        </div>
        ${slots.map(slot => slot.type === 'group' ? renderGroup(slot) : renderLineItem(slot.item, slot.stateId)).join('')}
        ${renderCategoryNotes(inst.id, inst.name)}
        <div class="px-0 pb-3 mt-3"><button data-action="add-item" data-cat="${cat.id}" class="inline-flex items-center justify-center gap-1.5 w-full py-3 rounded-xl border-2 border-dashed border-gray-200 text-gray-400 text-sm font-medium hover:border-orange-300 hover:text-orange-500 transition-colors">${PLUS}<span>Add Custom Item</span></button></div>
        </div>
        <div class="h-2"></div>
      </div>
    </div>`;
  }
  const slots = buildSlots(items, null);
  return `<div class="px-4 pt-4">
    <div class="flex justify-between items-center mb-3">
      <p class="text-xs font-bold uppercase tracking-widest text-gray-400">${cat.name}</p>
      <p class="text-xs text-gray-400">${checkedCount(cat)} / ${items.length} selected</p>
    </div>
    ${slots.map(slot => slot.type === 'group' ? renderGroup(slot) : renderLineItem(slot.item, slot.stateId)).join('')}
    ${renderCategoryNotes(cat.id, cat.name)}
    <div class="px-4 pb-3">
      <button data-action="add-item" data-cat="${cat.id}" class="inline-flex items-center justify-center gap-1.5 w-full py-3 rounded-xl border-2 border-dashed border-gray-200 text-gray-400 text-sm font-medium hover:border-orange-300 hover:text-orange-500 transition-colors">${PLUS}<span>Add Custom Item</span></button>
    </div>
    <div class="h-2"></div>
  </div>`;
}

function renderSearchBar() {
  return `
    <div class="bg-white border-b border-gray-200 px-4 py-2.5">
      <div class="flex items-center gap-3 bg-gray-100 rounded-xl px-3 py-2">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="global-search-input" data-action="search-input" type="text" value="${state.searchQuery.replace(/"/g,'&quot;')}"
          placeholder="Search all categories, items..."
          class="flex-1 bg-transparent border-0 outline-none text-sm py-0.5 placeholder-gray-400" />
        <button data-action="search-clear" class="text-gray-400 p-1 ${state.searchQuery ? '' : 'hidden'}">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>`;
}

function renderSearchResults() {
  const q = state.searchQuery.toLowerCase().trim();
  if (!q) return renderCategoryView();
  const index = [];
  CATEGORIES.forEach((cat, catIdx) => {
    (state.customItems[cat.id] || []).forEach(item => { index.push({ item, cat, catIdx }); });
    cat.items.forEach(item => { if (!item.noAction) index.push({ item, cat, catIdx }); });
  });
  const matches = index.filter(({ item }) =>
    item.name.toLowerCase().includes(q) || item.id.toLowerCase().includes(q)
  );
  if (!matches.length) {
    return `<div class="p-8 text-center"><p class="text-sm text-gray-400">No items matching &quot;${state.searchQuery}&quot;</p></div>`;
  }
  const grouped = {};
  matches.forEach(({ item, cat, catIdx }) => {
    if (!grouped[catIdx]) grouped[catIdx] = { cat, items: [] };
    grouped[catIdx].items.push(item);
  });
  return `<div class="px-4 pt-3 pb-4 space-y-2" id="search-results-container">
    ${Object.values(grouped).map(({ cat, items }) => `
      <div class="bg-white rounded-2xl shadow-sm overflow-hidden">
        <div class="px-4 py-2.5 bg-orange-50 border-b border-orange-100">
          <p class="text-xs font-bold uppercase tracking-widest text-orange-500">${cat.name}</p>
        </div>
        ${items.map(item => `
          <button data-action="search-select" data-cat="${CATEGORIES.indexOf(cat)}" data-id="${item.id}"
            class="w-full flex items-center gap-3 px-4 py-3 border-b border-gray-50 last:border-0 hover:bg-orange-50 active:bg-orange-100 text-left transition-colors">
            <span class="text-sm text-gray-800 flex-1">${item.name}</span>
            <span class="text-xs text-gray-400 font-mono">${item.id}</span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#d6d3d1" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        `).join('')}
      </div>
    `).join('')}
  </div>`;
}

function renderMain() {
  return `<div class="min-h-screen flex flex-col">
    ${renderHeader()}

function compressImage(file, maxDim = 1600, quality = 0.82) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const ratio = Math.min(maxDim / img.width, maxDim / img.height, 1);
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(img.width * ratio);
        canvas.height = Math.round(img.height * ratio);
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ============================================================
// AI DETECTION
// ============================================================
let _detectionModel = null;

async function analyzeImage(dataUrl) {
  const result = { objects: [], damageScore: 0, damageFlags: [] };
  const img = new Image();
  img.src = dataUrl;
  await img.decode();

  // Object detection with COCO-SSD
  if (window.tf && window.cocoSsd) {
    try {
      if (!_detectionModel) _detectionModel = await cocoSsd.load({ base: 'mobilenet_v2' });
      const predictions = await _detectionModel.detect(img);
      result.objects = predictions
        .filter(p => p.score > 0.25)
        .map(p => ({ class: p.class, score: Math.round(p.score * 100) }));
    } catch (_) {}
  }

  // Canvas-based damage anomaly detection
  try {
    const c = document.createElement('canvas');
    c.width = img.naturalWidth; c.height = img.naturalHeight;
    const ctx = c.getContext('2d');
    ctx.drawImage(img, 0, 0);
    const d = ctx.getImageData(0, 0, c.width, c.height).data;
    const total = d.length / 4;
    const step = Math.max(4, Math.round(Math.sqrt(total / 8000))) * 4;
    let anomalies = 0, samples = 0;
    for (let i = 0; i < d.length; i += step) {
      const r = d[i], g = d[i + 1], b = d[i + 2];
      const lum = 0.299 * r + 0.587 * g + 0.114 * b;
      samples++;
      if (lum < 70) { anomalies++; continue; }
      if (r < 100 && g < 100 && b < 70) { anomalies++; continue; }
      if (g > r * 1.3 && g > b * 1.2 && lum < 160) { anomalies++; continue; }
      if (r > g * 1.25 && g > b * 1.1 && lum < 170) { anomalies++; continue; }
    }
    const ratio = anomalies / samples;
    result.damageScore = Math.round(Math.min(ratio * 100, 100));
    if (result.damageScore > 12) result.damageFlags.push('⚠ Anomalous areas');
    if (result.damageScore > 35) result.damageFlags.push('⚠ Inspect closely');
    if (result.damageScore < 12) result.damageFlags.push('✓ Surface looks normal');
  } catch (_) {}

  return result;
}

function renderDetections(ph) {
  if (!ph.detections) return '';
  const parts = [];
  if (ph.detections.objects.length) {
    ph.detections.objects.slice(0, 3).forEach(o => {
      const hue = o.score > 70 ? 'bg-green-100 text-green-700' : o.score > 40 ? 'bg-yellow-100 text-yellow-700' : 'bg-gray-100 text-gray-500';
      parts.push(`<span class="text-[10px] px-1 rounded ${hue} leading-tight whitespace-nowrap">${o.class} ${o.score}%</span>`);
    });
  }
  if (ph.detections.objects.length > 3) parts.push('<span class="text-[10px] text-gray-400">+'+ (ph.detections.objects.length - 3) +'</span>');
  if (ph.detections.damageFlags.length) {
    const dScore = ph.detections.damageScore;
    const hue = dScore > 35 ? 'text-red-600' : dScore > 12 ? 'text-yellow-600' : 'text-green-600';
    const icon = dScore > 12 ? '⚠' : '✓';
    parts.push(`<span class="text-[10px] ${hue}">${icon} ${dScore}%</span>`);
  }
  if (!parts.length) return '';
  return `<div class="mt-0.5 flex flex-wrap gap-0.5 max-w-24">${parts.join('')}</div>`;
}

async function exportPackage() {
  if (typeof XLSX === 'undefined') { alert('Export library not loaded. Check your internet connection.'); return; }
  if (typeof JSZip === 'undefined') { alert('ZIP library not loaded. Check your internet connection.'); return; }

  const wb = XLSX.utils.book_new();
  const ws = {};
  let row = 0;
  const merges = [];
  const colWidths = [38, 16, 12, 10, 14];

  const s = (font, fill, align, border) => ({
    font: { name: 'Calibri', ...font },
    fill: fill ? { patternType: 'solid', fgColor: { rgb: fill } } : undefined,
    alignment: { wrapText: false, ...align },
    border: border || undefined,
  });

  const cell = (r, c, v, style, fmt) => {
    const addr = XLSX.utils.encode_cell({ r, c });
    ws[addr] = { v, t: typeof v === 'number' ? 'n' : 's', s: style };
    if (fmt) ws[addr].z = fmt;
  };
  const merge = (r, c1, c2) => merges.push({ s: { r, c: c1 }, e: { r, c: c2 } });

  cell(row, 0, 'SPARK HOMES — REPAIR ESTIMATE',
    s({ bold: true, sz: 14, color: { rgb: 'FFFFFF' } }, '111827', { horizontal: 'center', vertical: 'center' }));
  merge(row, 0, 4); row++;

  cell(row, 0, `Property: ${state.currentProjectName}     Date: ${new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}`,
    s({ sz: 10, color: { rgb: '6B7280' } }, 'F9FAFB', { horizontal: 'center' }));
  merge(row, 0, 4); row++;
  row++;

  const thinBorder = (col) => ({ top: { style: 'thin', color: { rgb: col } }, bottom: { style: 'thin', color: { rgb: col } }, left: { style: 'thin', color: { rgb: col } }, right: { style: 'thin', color: { rgb: col } } });

  const processSection = (label, rows) => {
    if (!rows.length) return;
    cell(row, 0, label.toUpperCase(), s({ bold: true, sz: 11, color: { rgb: 'FFFFFF' } }, 'EA580C', { vertical: 'center' }));
    for (let c = 1; c < 5; c++) cell(row, c, '', s({}, 'EA580C'));
    merge(row, 0, 4); row++;

    ['Repair Item','Unit','Unit Cost','Qty','Estimate'].forEach((h, c) =>
      cell(row, c, h, s({ bold: true, sz: 10, color: { rgb: '374151' } }, 'FFF7ED', { horizontal: c >= 2 ? 'right' : 'left' }, thinBorder('FDBA74'))));
    row++;

    let secTotal = 0;
    rows.forEach(({ item, s: st, t }) => {
      const rowStyle = s({ sz: 10, color: { rgb: '374151' } }, 'FFFFFF', {}, thinBorder('F3F4F6'));
      const yearStr = item.hasYear && st.year ? ` (${st.year})` : '';
      cell(row, 0, item.name + yearStr, rowStyle);
      cell(row, 1, item.unit, rowStyle);
      cell(row, 2, getItemCost(item), s({ sz: 10 }, 'FFFFFF', { horizontal: 'right' }, thinBorder('F3F4F6')), '"$"#,##0.00');
      cell(row, 3, parseFloat(st.qty) || 0, s({ sz: 10 }, 'FFFFFF', { horizontal: 'right' }, thinBorder('F3F4F6')));
      cell(row, 4, t, s({ sz: 10 }, 'FFFFFF', { horizontal: 'right' }, thinBorder('F3F4F6')), '"$"#,##0');
      secTotal += t; row++;
    });

    const totStyle = s({ bold: true, sz: 10, color: { rgb: 'C2410C' } }, 'FFF7ED', {}, thinBorder('FDBA74'));
    cell(row, 0, `${label} Total`, totStyle); merge(row, 0, 3);
    for (let c = 1; c < 4; c++) cell(row, c, '', totStyle);
    cell(row, 4, secTotal, s({ bold: true, sz: 10, color: { rgb: 'C2410C' } }, 'FFF7ED', { horizontal: 'right' }, thinBorder('FDBA74')), '"$"#,##0');
    row++;
    row++;
  };

  CATEGORIES.forEach(cat => {
    if (cat.type === 'multi') {
      const rd = getRoomData(cat);
      rd.instances.forEach(inst => {
        const rows = getMultiItems(cat)
          .filter(item => { const st = state.items[`${inst.id}:${item.id}`]; return st?.checked && parseFloat(st.qty) > 0; })
          .map(item => ({ item, s: state.items[`${inst.id}:${item.id}`], t: calcItem(item, state.items[`${inst.id}:${item.id}`]) }));
        processSection(inst.name, rows);
      });
    } else {
      const rows = getMultiItems(cat)
        .filter(item => { const st = state.items[item.id]; return st?.checked && parseFloat(st.qty) > 0; })
        .map(item => ({ item, s: state.items[item.id], t: calcItem(item, state.items[item.id]) }));
      processSection(cat.name, rows);
    }
  });

  const grand = calcRunningTotal();
  cell(row, 0, 'TOTAL ESTIMATE', s({ bold: true, sz: 13, color: { rgb: 'FFFFFF' } }, '111827', { horizontal: 'center', vertical: 'center' }));
  merge(row, 0, 3);
  for (let c = 1; c < 4; c++) cell(row, c, '', s({}, '111827'));
  cell(row, 4, grand, s({ bold: true, sz: 13, color: { rgb: 'FFFFFF' } }, '111827', { horizontal: 'right', vertical: 'center' }), '"$"#,##0');

  ws['!ref'] = XLSX.utils.encode_range({ s: { r: 0, c: 0 }, e: { r: row, c: 4 } });
  ws['!cols'] = colWidths.map(w => ({ wch: w }));
  ws['!merges'] = merges;

  const photoEntries = Object.entries(state.photos || {}).filter(([, arr]) => arr?.length > 0);
  if (!photoEntries.length) {
    XLSX.writeFile(wb, `${baseName}.xlsx`);
    return;
  }

  const zip = new JSZip();
  zip.file(`${baseName}.xlsx`, XLSX.write(wb, { bookType: 'xlsx', type: 'array' }));
  const folder = zip.folder('photos');
  photoEntries.forEach(([stateId, photos]) => {
    const def = findItemDef(stateId);
    const prefix = (def?.name || stateId).replace(/[^a-z0-9]/gi, '_');
    photos.forEach((ph, i) => {
      const ext = (ph.dataUrl.split(';')[0].split('/')[1] || 'jpg').replace('jpeg', 'jpg');
      const tag = ph.serial ? `_${ph.serial.replace(/[^a-z0-9]/gi,'_')}` : '';
      folder.file(`${prefix}${tag}_${i + 1}.${ext}`, ph.dataUrl.split(',')[1], { base64: true });
    });
  });
  const blob = await zip.generateAsync({ type: 'blob' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${baseName}.zip`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

// ============================================================
// INLINE COST EDITOR
// ============================================================
function promptCost(itemId, currentCost) {
  const newCost = prompt(`Edit unit cost for this item:`, currentCost.toFixed(2));
  if (newCost === null) return;
  const val = parseFloat(newCost);
  if (isNaN(val) || val < 0) { alert('Please enter a valid positive number.'); return; }
  state.projectPriceOverrides[itemId] = val;
  scheduleSave();
  render();
}

// ============================================================
// EVENTS
// ============================================================
function bindEvents() {}

document.body.addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;

  if (action === 'open-panel')       { openPanel(); return; }
  if (action === 'open-settings')    { openSettings(); return; }
  if (action === 'export-excel')     { exportPackage(); return; }
  if (action === 'export-pdf')       { window.print(); return; }
  if (action === 'search-clear') {
    state.searchQuery = '';
    const container = document.getElementById('scroll-area');
    const input = document.getElementById('global-search-input');
    if (input) input.value = '';
    if (container) container.innerHTML = renderSearchResults();
    const tabs = document.getElementById('category-tabs');
    if (tabs) tabs.style.display = '';
    const clear = document.querySelector('[data-action="search-clear"]');
    if (clear) clear.classList.add('hidden');
    return;
  }
  if (action === 'search-select') {
    const catIdx = parseInt(btn.dataset.cat);
    const itemId = btn.dataset.id;
    state.currentCat = catIdx;
    state.showSummary = false;
    state.searchQuery = '';
    const gid = findGroupForItem(itemId);
    state.expandedGroups = gid ? [gid] : [];
    render();
    setTimeout(() => {
      const tabs = document.getElementById('category-tabs');
      const tab = tabs?.querySelector(`[data-action="switch-cat"][data-index="${catIdx}"]`);
      if (tab) tab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      const sel = document.querySelector(`[data-action="toggle-item"][data-id="${itemId}"]`) ||
                 document.querySelector(`[data-action="toggle-item"][data-id$=":${itemId}"]`);
      const card = sel?.closest('[data-item-card]');
      if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 150);
    return;
  }

  if (action === 'toggle-item') {
    const id = btn.dataset.id;
    const s = state.items[id];
    if (!s) return;
    s.checked = !s.checked;
    if (!s.checked) s.qty = '';
    saveCurrentState(); render();
    if (s.checked) document.querySelector(`[data-action="update-qty"][data-id="${id}"]`)?.focus();
    return;
  }
  if (action === 'switch-cat') {
    state.currentCat = parseInt(btn.dataset.index);
    render();
    document.getElementById('scroll-area')?.scrollTo(0,0);
    return;
  }
  if (action === 'prev-cat') {
    state.currentCat = Math.max(0, state.currentCat - 1);
    render(); document.getElementById('scroll-area')?.scrollTo(0,0); return;
  }
  if (action === 'next-cat') {
    state.currentCat = Math.min(CATEGORIES.length - 1, state.currentCat + 1);
    render(); document.getElementById('scroll-area')?.scrollTo(0,0); return;
  }
  if (action === 'toggle-group') {
    const gid = btn.dataset.gid;
    const scrollEl = document.getElementById('scroll-area');
    const scrollTop = scrollEl ? scrollEl.scrollTop : 0;
    const idx = state.expandedGroups.indexOf(gid);
    if (idx >= 0) state.expandedGroups.splice(idx, 1); else state.expandedGroups.push(gid);
    render();
    if (scrollEl) requestAnimationFrame(() => document.getElementById('scroll-area')?.scrollTo(0, scrollTop));
    return;
  }
  if (action === 'switch-instance') {
    const catId = btn.dataset.cat;
    const idx = parseInt(btn.dataset.index);
    const rd = state.rooms[catId];
    if (rd) { rd.current = idx; render(); document.getElementById('scroll-area')?.scrollTo(0,0); }
    return;
  }
  if (action === 'edit-instance-name') {
    const catId = btn.dataset.cat;
    const idx = parseInt(btn.dataset.index);
    const cat = CATEGORIES.find(c => c.id === catId);
    const rd = state.rooms[catId];
    if (!rd || !cat) return;
    openModal(`Rename ${cat.name}`, `e.g. Master ${cat.name}`, rd.instances[idx].name, name => {
      rd.instances[idx].name = name;
      saveCurrentState(); render();
    });
    return;
  }
  if (action === 'add-instance') {
    const catId = btn.dataset.cat;
    const cat = CATEGORIES.find(c => c.id === catId);
    const rd = state.rooms[catId];
    if (!rd || !cat) return;
    const id = `${catId.slice(0,2)}${Date.now()}`;
    const name = `${cat.name} ${rd.instances.length + 1}`;
    rd.instances.push({ id, name });
    getMultiItems(cat).forEach(item => { state.items[`${id}:${item.id}`] = blankItemState(); });
    rd.current = rd.instances.length - 1;
    saveCurrentState(); render(); return;
  }
  if (action === 'remove-instance') {
    const catId = btn.dataset.cat;
    const idx = parseInt(btn.dataset.index);
    const cat = CATEGORIES.find(c => c.id === catId);
    const rd = state.rooms[catId];
    if (!rd || !cat) return;
    const inst = rd.instances[idx];
    if (!confirm(`Remove "${inst.name}"? All entries will be lost.`)) return;
    getMultiItems(cat).forEach(item => { delete state.items[`${inst.id}:${item.id}`]; });
    rd.instances.splice(idx, 1);
    rd.current = Math.min(rd.current, rd.instances.length - 1);
    saveCurrentState(); render(); return;
  }
  if (action === 'rename-project') {
    openModal('Rename Project', 'e.g. 123 Main St', state.currentProjectName, name => {
      state.currentProjectName = name;
      saveCurrentState();
      render();
    });
    return;
  }
  if (action === 'add-photo') {
    const id = btn.dataset.id;
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.capture = 'environment';
    input.style.cssText = 'position:fixed;top:-999px;opacity:0';
    document.body.appendChild(input);
    input.onchange = async () => {
      document.body.removeChild(input);
      if (!input.files || !input.files.length) return;
      if (!state.photos[id]) state.photos[id] = [];
      for (const file of Array.from(input.files)) {
        const dataUrl = await compressImage(file);
        const ph = { name: file.name, dataUrl, serial: '', detections: null };
        state.photos[id].push(ph);
        try {
          if ('BarcodeDetector' in window) {
            const detector = new BarcodeDetector();
            const img = new Image();
            img.src = dataUrl;
            await img.decode();
            const codes = await detector.detect(img);
            if (codes.length) ph.serial = codes[0].rawValue;
          }
        } catch (_) {}
        ph.detections = await analyzeImage(dataUrl);
      }
      saveCurrentState(); render();
    };
    input.click();
    return;
  }
  if (action === 'remove-photo') {
    const id = btn.dataset.id;
    const idx = parseInt(btn.dataset.index);
    if (state.photos[id]) state.photos[id].splice(idx, 1);
    scheduleSave(); render();
    return;
  }
  if (action === 'show-summary')  { state.showSummary = true;  saveCurrentState(); render(); return; }
  if (action === 'back-to-edit')  { state.showSummary = false; render(); return; }
  if (action === 'reset') {
    if (!confirm('Start a new estimate? All entries will be cleared.')) return;
    initState();
    saveCurrentState(); render(); return;
  }
  if (action === 'edit-cost') {
    const id = btn.dataset.id;
    const def = findItemDef(id);
    if (!def) return;
    promptCost(id, getItemCost(def));
    return;
  }
  if (action === 'inc-qty') {
    const id = btn.dataset.id;
    const s = state.items[id];
    if (!s) return;
    const cur = parseFloat(s.qty) || 0;
    s.qty = String(cur + 1);
    updateTotalsInPlace(id);
    scheduleSave();
    const inp = document.querySelector(`[data-action="update-qty"][data-id="${id}"]`);
    if (inp) inp.value = s.qty;
    return;
  }
  if (action === 'dec-qty') {
    const id = btn.dataset.id;
    const s = state.items[id];
    if (!s) return;
    const cur = parseFloat(s.qty) || 0;
    if (cur <= 0) return;
    s.qty = String(cur - 1);
    updateTotalsInPlace(id);
    scheduleSave();
    const inp = document.querySelector(`[data-action="update-qty"][data-id="${id}"]`);
    if (inp) inp.value = s.qty;
    return;
  }
  if (action === 'share-project') {
    const total = calcRunningTotal();
    const lines = [`Repair Estimate for ${state.currentProjectName}`];
    CATEGORIES.forEach(cat => {
      if (cat.type === 'multi') {
        const rd = getRoomData(cat);
        rd.instances.forEach(inst => {
          const items = getMultiItems(cat).filter(item => { const s = state.items[`${inst.id}:${item.id}`]; return s?.checked && parseFloat(s.qty) > 0; });
          if (!items.length) return;
          lines.push(`\n${inst.name}:`);
          items.forEach(item => { const s = state.items[`${inst.id}:${item.id}`]; const t = calcItem(item, s); lines.push(`  ${item.name}: ${s.qty} × $${getItemCost(item).toFixed(2)} = ${fmtTotal(t)}`); });
        });
      } else {
        const items = getMultiItems(cat).filter(item => { const s = state.items[item.id]; return s?.checked && parseFloat(s.qty) > 0; });
        if (!items.length) return;
        lines.push(`\n${cat.name}:`);
        items.forEach(item => { const s = state.items[item.id]; const t = calcItem(item, s); lines.push(`  ${item.name}: ${s.qty} × $${getItemCost(item).toFixed(2)} = ${fmtTotal(t)}`); });
      }
    });
    lines.push(`\nTotal Estimate: ${fmtTotal(total)}`);
    const msg = lines.join('\n');
    if (navigator.share) {
      navigator.share({ title: 'Repair Estimate', text: msg }).catch(() => {});
    } else {
      navigator.clipboard.writeText(msg).then(() => alert('Estimate summary copied to clipboard')).catch(() => alert(msg));
    }
    return;
  }
  if (action === 'clear-note') {
    const id = btn.dataset.id;
    if (state.notes[id]) { state.notes[id] = ''; scheduleSave(); render(); }
    return;
  }
  if (action === 'dictate-note') {
    const id = btn.dataset.id;
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert('Speech recognition not supported in this browser. Try Chrome on Android or desktop.'); return; }
    if (state._dictating) return;
    state._dictating = true;
    const r = new SR();
    r.lang = 'en-US';
    r.interimResults = false;
    r.continuous = false;
    btn.classList.add('text-orange-500');
    const dot = document.createElement('span');
    dot.className = 'text-orange-500 text-sm font-bold tracking-widest animate-pulse';
    dot.textContent = '...';
    btn.insertAdjacentElement('afterend', dot);
    r.onresult = e => {
      const t = e.results[0][0].transcript;
      state.notes[id] = (state.notes[id] || '') + (state.notes[id] ? ' ' : '') + t;
      scheduleSave();
      const ta = document.querySelector(`[data-action="update-note"][data-id="${id}"]`);
      if (ta) ta.value = state.notes[id];
    };
    const cleanup = () => { state._dictating = false; btn.classList.remove('text-orange-500'); if (dot.parentNode) dot.remove(); };
    r.onend = cleanup;
    r.onerror = cleanup;
    r.start();
    return;
  }
  if (action === 'add-item') {
    const catId = btn.dataset.cat;
    const name = prompt('Item name:');
    if (!name || !name.trim()) return;
    const costStr = prompt('Unit cost ($):');
    const cost = parseFloat(costStr);
    if (isNaN(cost) || cost < 0) { alert('Invalid cost.'); return; }
    const unit = prompt('Unit (e.g. ea., sqft, LF):') || 'ea.';
    const cat = CATEGORIES.find(c => c.id === catId);
    if (!cat) return;
    if (!state.customItems[catId]) state.customItems[catId] = [];
    const newId = genItemId(catId);
    const newItem = { id: newId, name: name.trim(), cost, unit };
    state.customItems[catId].push(newItem);
    if (cat.type === 'multi') {
      const rd = getRoomData(cat);
      rd.instances.forEach(inst => { state.items[`${inst.id}:${newId}`] = blankItemState(); });
    } else {
      state.items[newId] = blankItemState();
    }
    saveCurrentState(); render(); return;
  }
  if (action === 'delete-item') {
    const id = btn.dataset.id;
    if (!confirm('Remove this custom item?')) return;
    // Find which category this custom item belongs to
    for (const cat of CATEGORIES) {
      const custom = state.customItems[cat.id];
      if (!custom) continue;
      const idx = custom.findIndex(i => i.id === id);
      if (idx >= 0) {
        custom.splice(idx, 1);
        if (cat.type === 'multi') {
          const rd = getRoomData(cat);
          rd.instances.forEach(inst => { delete state.items[`${inst.id}:${id}`]; });
        } else {
          delete state.items[id];
        }
        break;
      }
    }
    saveCurrentState(); render(); return;
  }
});

document.body.addEventListener('input', e => {
  const panelSearchEl = e.target.closest('#panel-search-input');
  if (panelSearchEl) {
    state.panelSearchQuery = panelSearchEl.value;
    const clear = document.getElementById('panel-search-clear');
    if (clear) clear.classList.toggle('hidden', !state.panelSearchQuery);
    refreshPanelList();
    return;
  }
  const searchEl = e.target.closest('[data-action="search-input"]');
  if (searchEl) {
    state.searchQuery = searchEl.value;
    const container = document.getElementById('scroll-area');
    if (container) container.innerHTML = renderSearchResults();
    const tabs = document.getElementById('category-tabs');
    if (tabs) tabs.style.display = state.searchQuery.trim() ? 'none' : '';
    const clear = document.querySelector('[data-action="search-clear"]');
    if (clear) clear.classList.toggle('hidden', !state.searchQuery);
    return;
  }
  const qtyEl = e.target.closest('[data-action="update-qty"]');
  if (qtyEl) {
    state.items[qtyEl.dataset.id].qty = qtyEl.value;
    updateTotalsInPlace(qtyEl.dataset.id);
    scheduleSave(); return;
  }
  const yrEl = e.target.closest('[data-action="update-year"]');
  if (yrEl) { state.items[yrEl.dataset.id].year = yrEl.value; scheduleSave(); return; }
  const noteEl = e.target.closest('[data-action="update-note"]');
  if (noteEl) { state.notes[noteEl.dataset.id] = noteEl.value; scheduleSave(); return; }
  const serialEl = e.target.closest('[data-action="update-serial"]');
  if (serialEl) {
    const id = serialEl.dataset.id;
    const idx = parseInt(serialEl.dataset.index);
    if (state.photos[id] && state.photos[id][idx]) { state.photos[id][idx].serial = serialEl.value; scheduleSave(); }
    return;
  }
  const costEl = e.target.closest('[data-action="update-custom-cost"]');
  if (costEl) {
    const id = costEl.dataset.id;
    const val = parseFloat(costEl.value);
    if (!isNaN(val) && val >= 0) {
      const parts = id.split(':');
      const rawId = parts.length > 1 ? parts[1] : id;
      const catId = rawId.split('-')[0];
      const custom = (state.customItems[catId] || []).find(i => i.id === rawId);
      if (custom) { custom.cost = val; scheduleSave(); }
    }
    return;
  }
  const dealEl = e.target.closest('[data-action="update-deal"]');
  if (dealEl) {
    state.deal[dealEl.dataset.field] = dealEl.value;
    scheduleSave();
    // Update just the deal results in-place (don't re-render whole DOM — kills focus)
    if (state.showSummary) {
      const el = document.getElementById('deal-results');
      if (el) el.outerHTML = `<div id="deal-results">${renderDealResults()}</div>`;
    }
    return;
  }
});

// Settings modal
function openSettings() {
  refreshPriceStatus();
  document.getElementById('settings-modal').classList.remove('hidden');
}
function closeSettings() {
  document.getElementById('settings-modal').classList.add('hidden');
}
function refreshPriceStatus() {
  const count = Object.keys(state.priceOverrides).length;
  const el = document.getElementById('price-status');
  const resetBtn = document.getElementById('reset-prices-btn');
  if (count > 0) {
    el.textContent = `Custom prices active — ${count} item${count !== 1 ? 's' : ''} overridden`;
    el.className = 'mb-4 px-4 py-3 rounded-xl text-sm bg-orange-50 text-orange-700';
    resetBtn.classList.remove('hidden');
  } else {
    el.textContent = 'Using default prices';
    el.className = 'mb-4 px-4 py-3 rounded-xl text-sm bg-gray-50 text-gray-500';
    resetBtn.classList.add('hidden');
  }
}

document.getElementById('settings-bg').addEventListener('click', closeSettings);
document.getElementById('settings-close').addEventListener('click', closeSettings);

document.getElementById('price-csv-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const rows = parseCSV(ev.target.result);
    let updated = 0;
    rows.forEach(row => {
      const id = row.id?.trim();
      const cost = parseFloat(row.cost);
      if (id && !isNaN(cost) && cost >= 0) { state.priceOverrides[id] = cost; updated++; }
    });
    savePriceOverrides();
    refreshPriceStatus();
    render();
    alert(`${updated} price${updated !== 1 ? 's' : ''} updated successfully.`);
  };
  reader.readAsText(file);
  e.target.value = '';
});

document.getElementById('reset-prices-btn').addEventListener('click', () => {
  if (!confirm('Reset all prices to defaults?')) return;
  state.priceOverrides = {};
  savePriceOverrides();
  refreshPriceStatus();
  render();
});

// ============================================================
// PARTIAL UPDATE
// ============================================================
function updateTotalsInPlace(changedId) {
  const itemDef = findItemDef(changedId);
  if (!itemDef) return;
  const s = state.items[changedId];
  const t = calcItem(itemDef, s);

  const toggleBtn = document.querySelector(`[data-action="toggle-item"][data-id="${changedId}"]`);
  const card = toggleBtn?.closest('[data-item-card]');
  if (card) {
    const el = card.querySelector('.font-bold.text-base.flex-shrink-0');
    if (el) { el.textContent = t > 0 ? fmtTotal(t) : '—'; el.className = `font-bold text-base flex-shrink-0 ${t > 0 ? 'text-orange-600' : 'text-gray-200'}`; }
  }
  const groupCard = toggleBtn?.closest('[data-group-card]');
  if (groupCard) {
    const gid = groupCard.dataset.gid;
    const group = GROUPS[gid];
    if (group) {
      const isMulti = changedId.includes(':');
      const instId = isMulti ? changedId.split(':')[0] : null;
      const groupTotal = group.ids.reduce((sum, id) => {
        const sid = instId ? `${instId}:${id}` : id;
        const def = findItemDef(sid);
        return sum + (def ? calcItem(def, state.items[sid]) : 0);
      }, 0);
      const totalEl = groupCard.querySelector('[data-group-total]');
      if (totalEl) {
        totalEl.textContent = groupTotal > 0 ? fmtTotal(groupTotal) : '—';
        totalEl.className = `font-bold text-base flex-shrink-0 ml-2 ${groupTotal > 0 ? 'text-orange-600' : 'text-gray-200'}`;
      }
    }
  }

  const hdr = document.querySelector('.text-5xl.font-bold');
  if (hdr) hdr.textContent = fmtTotal(calcRunningTotal());

  const cat = CATEGORIES[state.currentCat];
  const ct = calcCategoryTotal(cat);
  const tabSpan = document.querySelector(`[data-action="switch-cat"][data-index="${state.currentCat}"] span`);
  if (tabSpan) tabSpan.textContent = ct > 0 ? fmtTotal(ct) : '';

  const secEl = document.querySelector('.text-xs.text-gray-400.mt-1\\.5.truncate');
  if (secEl) {
    const n = CATEGORIES.filter(c => calcCategoryTotal(c) > 0).length;
    secEl.textContent = `${state.currentProjectName} · ${n} active section${n !== 1 ? 's' : ''}`;
  }
}

// ============================================================
// BOOT
// ============================================================
(function boot() {
  state.priceOverrides = loadPriceOverrides();
  const projects = loadProjects();
  if (projects.length > 0) {
    loadProjectIntoState(projects[0]);
  } else {
    state.currentProjectId = `proj_${Date.now()}`;
    state.currentProjectName = 'New Estimate';
    initState();
    saveCurrentState();
  }
  render();
  // Swipe gesture to navigate categories
  let _swipeX = 0, _swipeY = 0;
  document.addEventListener('touchstart', e => {
    const t = e.changedTouches[0];
    _swipeX = t.screenX; _swipeY = t.screenY;
  }, { passive: true });
  document.addEventListener('touchend', e => {
    if (state.showSummary) return;
    const t = e.changedTouches[0];
    const dx = t.screenX - _swipeX, dy = t.screenY - _swipeY;
    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 2) {
      e.preventDefault();
      if (dx < 0 && state.currentCat < CATEGORIES.length - 1) {
        state.currentCat++;
        render();
        document.getElementById('scroll-area')?.scrollTo(0,0);
      } else if (dx > 0 && state.currentCat > 0) {
        state.currentCat--;
        render();
        document.getElementById('scroll-area')?.scrollTo(0,0);
      }
    }
  }, { passive: false });
  window.addEventListener('visibilitychange', () => { if (document.hidden) saveCurrentState(); });
  window.addEventListener('pagehide', saveCurrentState);
  window.addEventListener('freeze', saveCurrentState);
})();
